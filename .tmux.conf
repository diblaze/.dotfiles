# --- Remap prefix from Ctrl-b to Ctrl-a (easier to reach) ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Start windows/panes at 1, not 0 ---
set -g base-index 1
setw -g pane-base-index 1

# --- Renumber windows when one is closed ---
set -g renumber-windows on

# --- Better split bindings ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Navigate panes with Alt+arrow (no prefix needed) ---
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# --- Resize panes with Ctrl+arrow ---
bind -n C-Left resize-pane -L 5
bind -n C-Right resize-pane -R 5
bind -n C-Up resize-pane -U 5
bind -n C-Down resize-pane -D 5

# --- Mouse support ---
set -g mouse on

# --- Don't rename windows automatically ---
set -g allow-rename off

# --- History ---
set -g history-limit 50000

# --- Faster escape (important for vim/editors) ---
set -sg escape-time 0

# --- True color support (for Ghostty + Tokyo Night) ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# --- Status bar ---
set -g status-position top
set -g status-interval 5
set -g status-style "bg=default,fg=white"
set -g status-left "#[fg=cyan,bold] #S "
set -g status-right "#[fg=white]%H:%M #[fg=cyan]%d-%b "
set -g status-left-length 30

# --- Active/inactive pane styling ---
set -g pane-active-border-style "fg=cyan"
set -g pane-border-style "fg=#444444"

# --- Window status ---
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=cyan,bold] #I:#W "

# --- Reload config with prefix+r ---
bind r source-file ~/.tmux.conf \; display "Config reloaded"
